version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  Home Credit Default Risk — Docker Compose
#
#  Сервіси:
#    db       — PostgreSQL 16
#    app      — Streamlit (порт 8503)
#
#  Швидкий старт:
#    docker compose up -d
#    open http://localhost:8503
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: home_credit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1111}
      POSTGRES_DB:       ${DB_NAME:-data default}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: place *.sql init scripts in docker/initdb/ — runs on first start
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hcdr_net

  # ── Streamlit app ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home_credit_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Override DB_HOST so the app talks to the db container
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      # Mount models & data so they persist outside the image
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "8503:8501"
    networks:
      - hcdr_net

volumes:
  postgres_data:

networks:
  hcdr_net:
    driver: bridge