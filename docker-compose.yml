services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1111}
      POSTGRES_DB:       postgres          # головна DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hc_net

  # ── 2. Jupyter (EDA + model training) ────────────────────────────────
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    container_name: hc_jupyter
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres          # всередині docker мережі
    volumes:
      - .:/app                   # весь проєкт монтується
      - parquet_cache:/app/data/parquet
      - models_vol:/app/models
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hc_net
    command: >
      jupyter notebook
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --NotebookApp.token=''
        --NotebookApp.password=''
        --notebook-dir=/app

  # ── 3. Streamlit (deploy) ─────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: hc_streamlit
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
    volumes:
      - parquet_cache:/app/data/parquet
      - models_vol:/app/models
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hc_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes ───────────────────────────────────────────────────────────
volumes:
  postgres_data:    # PostgreSQL дані
  parquet_cache:    # parquet файли (спільний між jupyter і streamlit)
  models_vol:       # pkl + metadata (спільний між jupyter і streamlit)

# ── Network ───────────────────────────────────────────────────────────
networks:
  hc_net:
    driver: bridge